services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: devilmodz
    ports:
      - "5432:5432"
    volumes:
      - devilmodz-db:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - db
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/devilmodz
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: change-me-in-production
      DISCORD_CLIENT_ID: change-me
      DISCORD_CLIENT_SECRET: change-me
    ports:
      - "3000:3000"

volumes:
  devilmodz-db: