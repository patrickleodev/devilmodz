services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: devilmodz
    ports:
      - "5433:5432"
    volumes:
      - devilmodz-db:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      MERCADO_PAGO_MODE: ${MERCADO_PAGO_MODE:-production}
      TYPEORM_SYNCHRONIZE: "true"
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/devilmodz}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-in-production}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      DISCORD_PUBLIC_KEY: ${DISCORD_PUBLIC_KEY}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      DISCORD_NOTIFICATION_CHANNEL_ID: ${DISCORD_NOTIFICATION_CHANNEL_ID}
      MERCADO_PAGO_ACCESS_TOKEN: ${MERCADO_PAGO_ACCESS_TOKEN}
      APP_URL: ${APP_URL:-http://localhost:3000}
    ports:
      - "3000:3000"

volumes:
  devilmodz-db: